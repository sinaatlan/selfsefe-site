<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>self-sefe — söylenmeyecek her şey</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1410;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: Georgia, serif;
      user-select: none;
    }

    #viewer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    /* Book spread */
    #spread {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 2px;
      width: 100%;
      max-width: 960px;
    }

    .page-slot {
      flex: 1;
      max-width: 460px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .page-slot img {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    .page-slot.empty {
      background: #0d0b09;
    }

    /* Controls */
    #controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .btn {
      background: none;
      border: 1px solid rgba(232,227,214,0.25);
      color: #E8E3D6;
      padding: 9px 24px;
      font-size: 12px;
      letter-spacing: 0.12em;
      cursor: pointer;
      font-family: Georgia, serif;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover:not(:disabled) {
      background: rgba(232,227,214,0.08);
      border-color: rgba(232,227,214,0.5);
    }

    .btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    #page-info {
      color: rgba(232,227,214,0.4);
      font-size: 12px;
      letter-spacing: 0.1em;
      min-width: 70px;
      text-align: center;
    }

    #hint {
      color: rgba(232,227,214,0.15);
      font-size: 11px;
      letter-spacing: 0.07em;
    }

    #home-link {
      color: rgba(232,227,214,0.2);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-decoration: none;
      margin-top: 4px;
    }
    #home-link:hover { color: rgba(232,227,214,0.5); }

    /* Loading */
    #loading {
      position: fixed;
      inset: 0;
      background: #1a1410;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading span {
      color: rgba(232,227,214,0.4);
      font-size: 13px;
      letter-spacing: 0.2em;
    }

    /* Mobile: single page */
    @media (max-width: 580px) {
      #spread { gap: 0; }
      .page-slot.right-slot { display: none; }
      .page-slot { max-width: 100%; }
    }
  </style>
</head>
<body>

<div id="loading"><span>yükleniyor…</span></div>

<div id="viewer">
  <div id="spread">
    <div class="page-slot left-slot"><img id="page-left" src="" alt=""></div>
    <div class="page-slot right-slot"><img id="page-right" src="" alt=""></div>
  </div>

  <div id="controls">
    <button class="btn" id="btn-prev">← önceki</button>
    <span id="page-info"></span>
    <button class="btn" id="btn-next">sonraki →</button>
  </div>

  <div id="hint">klavye: ← →  ·  tıkla: sayfa çevir</div>
  <a id="home-link" href="/">← ana sayfa</a>
</div>

<script>
  const PAGES = [
    'pages/self-sefe.png',
    'pages/self-sefe2.png',
    'pages/self-sefe3.png',
    'pages/self-sefe4.png',
    'pages/self-sefe5.png',
    'pages/self-sefe6.png',
    'pages/self-sefe7.png',
    'pages/self-sefe8.png',
    'pages/self-sefe9.png',
    'pages/self-sefe10.png',
    'pages/self-sefe11.png',
    'pages/self-sefe12.png',
    'pages/self-sefe13.png',
    'pages/self-sefe14.png',
    'pages/self-sefe15.png',
    'pages/self-sefe16.png',
    'pages/self-sefe17.png',
    'pages/self-sefe18.png',
    'pages/self-sefe19.png',
    'pages/self-sefe20.png',
    'pages/self-sefe21.png',
    'pages/self-sefe22.png',
    'pages/self-sefe23.png',
    'pages/self-sefe24.png',
    'pages/self-sefe25.png',
    'pages/self-sefe26.png',
    'pages/self-sefe27.png',
    'pages/self-sefe28.png',
    'pages/self-sefe29.png',
    'pages/self-sefe30.png',
    'pages/self-sefe31.png',
    'pages/self-sefe32.png',
    'pages/self-sefe33.png',
    'pages/self-sefe34.png',
    'pages/self-sefe35.png',
    'pages/self-sefe36.png',
    'pages/self-sefe37.png',
    'pages/self-sefe38.png',
    'pages/self-sefe39.png',
    'pages/self-sefe40.png',
    'pages/self-sefe41.png',
    'pages/self-sefe42.png',
    'pages/self-sefe43.png',
    'pages/self-sefe44.png',
    'pages/self-sefe45.png',
    'pages/self-sefe46.png',
    'pages/self-sefe47.png',
    'pages/self-sefe48.png'
  ];

  const isMobile = () => window.innerWidth <= 580;

  // Spread logic: on desktop show 2 pages, cover (p0) alone, then pairs 1-2, 3-4...
  // spreadIndex = which "spread" we're on
  // spread 0 → page 0 (cover, left only)
  // spread 1 → pages 1,2
  // spread 2 → pages 3,4  ...
  // spread n → pages (2n-1), (2n)

  let spreadIndex = 0;
  const totalPages = PAGES.length; // 48

  function pagesForSpread(si) {
    if (si === 0) return [0, null]; // cover alone on left
    const left  = 2 * si - 1;
    const right = 2 * si;
    return [left, right < totalPages ? right : null];
  }

  const totalSpreads = 1 + Math.ceil((totalPages - 1) / 2); // 1 + 24 = 25

  const imgLeft  = document.getElementById('page-left');
  const imgRight = document.getElementById('page-right');
  const rightSlot = document.querySelector('.right-slot');
  const btnPrev  = document.getElementById('btn-prev');
  const btnNext  = document.getElementById('btn-next');
  const pageInfo = document.getElementById('page-info');
  const loading  = document.getElementById('loading');

  function render() {
    const [l, r] = pagesForSpread(spreadIndex);
    const mobile = isMobile();

    imgLeft.src = PAGES[l];

    if (r !== null && !mobile) {
      imgRight.src = PAGES[r];
      rightSlot.style.display = '';
    } else {
      imgRight.src = '';
      rightSlot.style.display = 'none';
    }

    // Cover: show centered (hide right slot)
    if (spreadIndex === 0 || spreadIndex === totalSpreads - 1) {
      rightSlot.style.display = 'none';
    }

    const leftPage  = l + 1;
    const rightPage = r !== null ? r + 1 : null;
    if (mobile || r === null) {
      pageInfo.textContent = leftPage + ' / ' + totalPages;
    } else {
      pageInfo.textContent = leftPage + '–' + rightPage + ' / ' + totalPages;
    }

    btnPrev.disabled = spreadIndex === 0;
    btnNext.disabled = spreadIndex >= totalSpreads - 1;
  }

  function prev() { if (spreadIndex > 0) { spreadIndex--; render(); } }
  function next() { if (spreadIndex < totalSpreads - 1) { spreadIndex++; render(); } }

  btnPrev.addEventListener('click', prev);
  btnNext.addEventListener('click', next);

  // Click left/right half of spread to navigate
  document.getElementById('spread').addEventListener('click', (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const mid = rect.left + rect.width / 2;
    if (e.clientX < mid) prev(); else next();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  prev();
    if (e.key === 'ArrowRight') next();
  });

  window.addEventListener('resize', render);

  // Preload first image then show
  const firstImg = new Image();
  firstImg.onload = () => {
    render();
    setTimeout(() => loading.classList.add('hidden'), 200);
  };
  firstImg.onerror = () => {
    render();
    loading.classList.add('hidden');
  };
  firstImg.src = PAGES[0];
</script>
</body>
</html>
