<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>self-sefe — söylenmeyecek her şey</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1410;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      font-family: Georgia, serif;
      user-select: none;
    }

    #viewer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    /* Book spread */
    #spread {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 2px;
      width: 100%;
      max-width: 1400px;
    }

    .page-slot {
      flex: 1;
      max-width: 680px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .page-slot img {
      display: block;
      width: 100%;
      height: auto;
    }

    .page-slot.empty {
      background: #0d0b09;
    }

    /* Controls */
    #controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .btn {
      background: none;
      border: 1px solid rgba(232,227,214,0.25);
      color: #E8E3D6;
      padding: 9px 24px;
      font-size: 12px;
      letter-spacing: 0.12em;
      cursor: pointer;
      font-family: Georgia, serif;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover:not(:disabled) {
      background: rgba(232,227,214,0.08);
      border-color: rgba(232,227,214,0.5);
    }

    .btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    #page-info {
      color: rgba(232,227,214,0.4);
      font-size: 12px;
      letter-spacing: 0.1em;
      min-width: 70px;
      text-align: center;
    }

    #hint {
      color: rgba(232,227,214,0.15);
      font-size: 11px;
      letter-spacing: 0.07em;
    }

    #home-link {
      color: rgba(232,227,214,0.2);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-decoration: none;
      margin-top: 4px;
    }
    #home-link:hover { color: rgba(232,227,214,0.5); }

    /* Loading */
    #loading {
      position: fixed;
      inset: 0;
      background: #1a1410;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading span {
      color: rgba(232,227,214,0.4);
      font-size: 13px;
      letter-spacing: 0.2em;
    }

    /* Mobile: single page */
    @media (max-width: 580px) {
      #spread { gap: 0; }
      .page-slot.right-slot { display: none; }
      .page-slot { max-width: 100%; }
    }
  </style>
</head>
<body>

<div id="loading"><span>yükleniyor…</span></div>

<div id="viewer">
  <div id="spread">
    <div class="page-slot left-slot"><img id="page-left" src="" alt=""></div>
    <div class="page-slot right-slot"><img id="page-right" src="" alt=""></div>
  </div>

  <div id="controls">
    <button class="btn" id="btn-prev">← önceki</button>
    <span id="page-info"></span>
    <button class="btn" id="btn-next">sonraki →</button>
  </div>

  <div id="hint">klavye: ← →  ·  tıkla: sayfa çevir</div>
  <a id="home-link" href="/">← ana sayfa</a>
</div>

<script>
  const PAGES = [
    'pages/self-sefe.jpg',
    'pages/self-sefe2.jpg',
    'pages/self-sefe3.jpg',
    'pages/self-sefe4.jpg',
    'pages/self-sefe5.jpg',
    'pages/self-sefe6.jpg',
    'pages/self-sefe7.jpg',
    'pages/self-sefe8.jpg',
    'pages/self-sefe09.jpg',
    'pages/self-sefe9.jpg',
    'pages/self-sefe10.jpg',
    'pages/self-sefe11.jpg',
    'pages/self-sefe12.jpg',
    'pages/self-sefe13.jpg',
    'pages/self-sefe14.jpg',
    'pages/self-sefe15.jpg',
    'pages/self-sefe16.jpg',
    'pages/self-sefe17.jpg',
    'pages/self-sefe18.jpg',
    'pages/self-sefe19.jpg',
    'pages/self-sefe20.jpg',
    'pages/self-sefe020.jpg',
    'pages/self-sefe21.jpg',
    'pages/self-sefe22.jpg',
    'pages/self-sefe23.jpg',
    'pages/self-sefe24.jpg',
    'pages/self-sefe25.jpg',
    'pages/self-sefe26.jpg',
    'pages/self-sefe27.jpg',
    'pages/self-sefe28.jpg',
    'pages/self-sefe29.jpg',
    'pages/self-sefe30.jpg',
    'pages/self-sefe31.jpg',
    'pages/self-sefe32.jpg',
    'pages/self-sefe33.jpg',
    'pages/self-sefe34.jpg',
    'pages/self-sefe35.jpg',
    'pages/self-sefe36.jpg',
    'pages/self-sefe37.jpg',
    'pages/self-sefe38.jpg',
    'pages/self-sefe39.jpg',
    'pages/self-sefe40.jpg',
    'pages/self-sefe41.jpg',
    'pages/self-sefe42.jpg',
    'pages/self-sefe43.jpg',
    'pages/self-sefe44.jpg',
    'pages/self-sefe45.jpg',
    'pages/self-sefe46.jpg',
    'pages/self-sefe47.jpg',
    'pages/self-sefe48.jpg'
  ];

  const isMobile = () => window.innerWidth <= 580;

  const totalPages = PAGES.length; // 50

  // Desktop: spread-based (cover alone, then pairs)
  // Mobile: page-by-page
  let spreadIndex = 0; // desktop spreads
  let mobileIndex = 0; // mobile single page index

  function pagesForSpread(si) {
    if (si === 0) return [0, null];
    const left  = 2 * si - 1;
    const right = 2 * si;
    return [left, right < totalPages ? right : null];
  }

  const totalSpreads = 1 + Math.ceil((totalPages - 1) / 2);

  const imgLeft  = document.getElementById('page-left');
  const imgRight = document.getElementById('page-right');
  const rightSlot = document.querySelector('.right-slot');
  const btnPrev  = document.getElementById('btn-prev');
  const btnNext  = document.getElementById('btn-next');
  const pageInfo = document.getElementById('page-info');
  const loading  = document.getElementById('loading');

  function render() {
    const mobile = isMobile();

    if (mobile) {
      imgLeft.src = PAGES[mobileIndex];
      imgRight.src = '';
      rightSlot.style.display = 'none';
      pageInfo.textContent = (mobileIndex + 1) + ' / ' + totalPages;
      btnPrev.disabled = mobileIndex === 0;
      btnNext.disabled = mobileIndex >= totalPages - 1;
    } else {
      const [l, r] = pagesForSpread(spreadIndex);
      imgLeft.src = PAGES[l];

      const isCoverOrBack = (spreadIndex === 0 || spreadIndex === totalSpreads - 1);
      if (r !== null && !isCoverOrBack) {
        imgRight.src = PAGES[r];
        rightSlot.style.display = '';
      } else {
        imgRight.src = '';
        rightSlot.style.display = 'none';
      }

      const leftPage  = l + 1;
      const rightPage = r !== null && !isCoverOrBack ? r + 1 : null;
      pageInfo.textContent = rightPage
        ? leftPage + '–' + rightPage + ' / ' + totalPages
        : leftPage + ' / ' + totalPages;

      btnPrev.disabled = spreadIndex === 0;
      btnNext.disabled = spreadIndex >= totalSpreads - 1;
    }
  }

  function prev() {
    if (isMobile()) {
      if (mobileIndex > 0) { mobileIndex--; render(); }
    } else {
      if (spreadIndex > 0) { spreadIndex--; render(); }
    }
  }
  function next() {
    if (isMobile()) {
      if (mobileIndex < totalPages - 1) { mobileIndex++; render(); }
    } else {
      if (spreadIndex < totalSpreads - 1) { spreadIndex++; render(); }
    }
  }

  btnPrev.addEventListener('click', prev);
  btnNext.addEventListener('click', next);

  // Click left/right half of spread to navigate
  document.getElementById('spread').addEventListener('click', (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const mid = rect.left + rect.width / 2;
    if (e.clientX < mid) prev(); else next();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  prev();
    if (e.key === 'ArrowRight') next();
  });

  window.addEventListener('resize', render);

  // Preload first image then show
  const firstImg = new Image();
  firstImg.onload = () => {
    render();
    setTimeout(() => loading.classList.add('hidden'), 200);
  };
  firstImg.onerror = () => {
    render();
    loading.classList.add('hidden');
  };
  firstImg.src = PAGES[0];
</script>
</body>
</html>
